<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blueswoon®</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Basic CSS for the layout can go here */
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-image: url('images/vitavivabackground.jpeg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }
        header, footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1em 0;
        }
        main {
            padding: 2em;
            max-width: 800px;
            margin: 0 auto;
        }
        nav ul {
            list-style-type: none;
            padding: 0;
        }
        nav ul li {
            display: inline;
            margin-right: 10px;
        }
        a {
            text-decoration: none;
            color: #f9e2f9;
        }
    </style>
</head>
<body>

     <header class="site-header">
        <a href="index.html" class="logo-link">
            <img src="images/blueswoon.png" alt="blueswoon logo" class="logo-img" width="65" height="65">
        </a>
        <nav>
        <ul>
            <li><a href="index.html">Legendary Creations</a></li>
            <li><a href="glass and metal.html">Glass & Metal Works</a></li>
            <li><a href="custom paintings.html">Custom Paintings</a></li>
            <li><a href="home furnishings.html">Home Furnishings</a></li>
            <li><a href="sign_in.html">Sign In</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        </nav>
    </header>

    <main>
        <p>Questions about our legendary creations?</p>
        <section style="background-color: rgba(0, 0, 0, 0); padding: 2em; border-radius: 8px; margin: 2em 0;">         
            <h3>Drop us a line</h3>
            <form action="#" method="post" style="max-width: 600px; margin: 0 auto;">
                <div style="margin-bottom: 1em;">
                    <label for="name" style="display: block; margin-bottom: 0.5em;">Name:</label>
                    <input type="text" id="name" name="name" required style="width: 100%; padding: 0.5em; box-sizing: border-box;">
                </div>
                <div style="margin-bottom: 1em;">
                    <label for="email" style="display: block; margin-bottom: 0.5em;">Email:</label>
                    <input type="email" id="email" name="email" required style="width: 100%; padding: 0.5em; box-sizing: border-box;">
                </div>
                <div style="margin-bottom: 1em;">
                    <label for="message" style="display: block; margin-bottom: 0.5em;">Inquiry:</label>
                    <textarea id="message" name="message" rows="5" required style="width: 100%; padding: 0.5em; box-sizing: border-box;"></textarea>
                </div>
                <button type="submit" style="width: 100%; padding: 0.5em; background-color: #333; color: white; border: none; cursor: pointer;">Send Inquiry</button>
            </form>
        </section>
        
    </main>

    <footer>
        <p>&copy; 2026 Blueswoon®</p>
    </footer>

    <script>
        let currentSlide = 1;
        const totalSlides = 3;

        function changeSlide(direction) {
            currentSlide += direction;
            if (currentSlide < 1) currentSlide = totalSlides;
            if (currentSlide > totalSlides) currentSlide = 1;
            document.getElementById('slide' + currentSlide).checked = true;
        }
    </script>

</body>
</html>
