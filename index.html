<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chalet 222®</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Basic CSS for the layout can go here */
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header, footer {
            background-color: #333;
            color: white;
            padding: 1em 0;
        }
        header {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        footer {
            text-align: center;
        }
        main {
            padding: 2em;
            display: flex;
            justify-content: space-around;
            gap: 20px;
        }
        nav ul {
            list-style-type: none;
            padding: 0;
            text-align: center;
        }
        nav ul li {
            display: inline;
            margin-right: 10px;
        }
        a {
            text-decoration: none;
            color: #f9e2f9;
        }
        footer nav a {
            color: lightgray;
        }
        /* Carousel styles */
        .carousel {
            position: relative;
            overflow: hidden;
            width: 30%;
            margin: 0;
        }
        .carousel-container {
            display: flex;
            transition: transform 0.5s ease;
        }
        .carousel-item {
            min-width: 100%;
            box-sizing: border-box;
            padding: 10px;
            text-align: center;
        }
        .carousel-item img {
            width: 100%;
            height: auto;
            max-width: 200px;
        }
        .carousel-buttons {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
        }
        .carousel-buttons button {
            pointer-events: all;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            padding: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .carousel h3 {
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

     <header class="site-header">
        <a href="index.html" class="logo-link">
            <img src="images/chalet222.png" alt="chalet 222 logo" class="logo-img" width="200" height="65">
        </a>
        <nav>
        <ul>
           <li><a href="decor.html">222 | Dêcor</a></li>
            <li><a href="custom paintings.html">Paintings by Ashley</a></li>
            <li><a href="glass and metal.html">Beautifully Broken®</a></li>
        </ul>
        </nav>
    </header>

    <main>
        
        <section class="product-grid">
            <div class="grid-container">
                 <div class="product">
                    <img src="https://via.placeholder.com/300x200?text=Product+3" alt="Product 3">
                    <h4>Dêcor</h4>
                </div>
                <div class="product">
                    <img src="https://via.placeholder.com/300x200?text=Product+2" alt="Product 2">
                    <h4>Paintings</h4>
            </div>
                <div class="product">
                    <img src="https://via.placeholder.com/300x200?text=Product+1" alt="Product 1">
                    <h4>Glass & Metal</h4>
                </div>
        </section>
        
    </main>

    <footer>
        <nav>
        <ul>
            <li><a href="sign_in.html">Sign In</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        </nav>
        <p>&copy; 2026 Chalet 222®</p>
    </footer>

</body>
</html>
