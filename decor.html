<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chalet 222®</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Basic CSS for the layout can go here */
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header, footer {
            background-color: #333;
            color: white;
            padding: 1em 0;
        }
        header {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        footer {
            text-align: center;
        }
        main {
            padding: 2em;
            max-width: 800px;
            margin: 0 auto;
        }
        nav ul {
            list-style-type: none;
            padding: 0;
            text-align: center;
        }
        nav ul li {
            display: inline;
            margin-right: 10px;
        }
        a {
            text-decoration: none;
            color: #f9e2f9;
        }
        footer nav a {
            color: lightgray;
        }
        .product-grid .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        .product {
            text-align: center;
        }
    </style>
</head>
<body>

     <header class="site-header">
        <a href="index.html" class="logo-link">
            <img src="images/chalet222.png" alt="chalet 222 logo" class="logo-img" width="200" height="65">
        </a>
        <nav>
        <ul>
           <li><a href="decor.html">222 | Dêcor</a></li>
            <li><a href="custom paintings.html">Paintings by Ashley</a></li>
            <li><a href="glass and metal.html">Beautifully Broken®</a></li>
        </ul>
        </nav>
    </header>

    <main>
        
        <section class="product-grid">
            <div class="grid-container">
                <div class="product">
                    <img src="https://via.placeholder.com/300x200?text=Rustic+Table" alt="Rustic Table">
                    <h4>Kitchen</h4>
                    <p>for the kitchen</p>
                </div>
                <div class="product">
                    <img src="https://via.placeholder.com/300x200?text=Modern+Chair" alt="Modern Chair">
                    <h4>Bath</h4>
                    <p>for the bath</p>
                </div>
                <div class="product">
                    <img src="https://via.placeholder.com/300x200?text=Ambient+Lighting" alt="Ambient Lighting">
                    <h4>Home</h4>
                    <p>Our collection of home furnishings</p>
                </div>
            </div>
        </section>
        
    </main>

    <footer>
        <nav>
        <ul>
            <li><a href="sign_in.html">Sign In</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        </nav>
        <p>&copy; 2026 Chalet 222®</p>
    </footer>

</body>
</html>
