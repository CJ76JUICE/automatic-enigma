<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaViva®</title>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Basic CSS for the layout can go here */
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        header, footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1em 0;
        }
        main {
            padding: 2em;
            max-width: 800px;
            margin: 0 auto;
        }
        nav ul {
            list-style-type: none;
            padding: 0;
        }
        nav ul li {
            display: inline;
            margin-right: 10px;
        }
        a {
            text-decoration: none;
            color: #f9e2f9;
        }
    </style>
</head>
<body>

     <header class="site-header">
        <a href="index.html" class="logo-link">
            <img src="images/wakkafox.png" alt="wakkafox logo" class="logo-img" width="65" height="65">
        </a>
        <nav>
        <ul>
            <li><a href="index.html">Legendary Creations</a></li>
            <li><a href="glass and metal.html">Glass & Metal Works</a></li>
            <li><a href="custom paintings.html">Custom Paintings</a></li>
            <li><a href="home furnishings.html">Home Furnishings</a></li>
            <li><a href="sign_in.html">Sign In</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        </nav>
    </header>

    <main>
        
        <h2>Customer Login</h2>
        <form action="#" method="post" style="max-width: 400px; margin: 0 auto;">
            <div style="margin-bottom: 1em;">
                <label for="email" style="display: block; margin-bottom: 0.5em;">Email:</label>
                <input type="email" id="email" name="email" required style="width: 100%; padding: 0.5em; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 1em;">
                <label for="password" style="display: block; margin-bottom: 0.5em;">Password:</label>
                <input type="password" id="password" name="password" required style="width: 100%; padding: 0.5em; box-sizing: border-box;">
            </div>
            <button type="submit" style="width: 100%; padding: 0.5em; background-color: #333; color: white; border: none; cursor: pointer;">Login</button>
        </form>
        
    </main>

    <footer>
        <p>&copy; 2026 wakkafox®</p>
    </footer>

    <script>
        let currentSlide = 1;
        const totalSlides = 3;

        function changeSlide(direction) {
            currentSlide += direction;
            if (currentSlide < 1) currentSlide = totalSlides;
            if (currentSlide > totalSlides) currentSlide = 1;
            document.getElementById('slide' + currentSlide).checked = true;
        }
    </script>

</body>
</html>
